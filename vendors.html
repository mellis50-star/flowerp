<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowERP — Vendors</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    .app { display: flex; height: 100vh; }
    .sidebar { width: 210px; flex-shrink: 0; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; padding: 1rem 0; }
    .sidebar-logo { padding: 0 1.1rem 1rem; border-bottom: 1px solid #eee; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 600; color: #111; text-decoration: none; }
    .sidebar-logo i { color: #378ADD; font-size: 20px; }
    .section-label { font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: 0.06em; padding: 8px 1.1rem 4px; }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 1.1rem; font-size: 13px; color: #666; cursor: pointer; text-decoration: none; border-left: 2px solid transparent; }
    .nav-item:hover { background: #f5f5f5; color: #111; }
    .nav-item.active { background: #f0f7ff; color: #185FA5; font-weight: 500; border-left: 2px solid #378ADD; }
    .nav-item i { font-size: 16px; }
    .sidebar-footer { margin-top: auto; padding: 1rem 1.1rem; border-top: 1px solid #eee; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .sidebar-footer:hover { background: #f5f5f5; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; background: #378ADD; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0; }
    .user-name { font-size: 12px; font-weight: 500; color: #111; }
    .user-company { font-size: 11px; color: #999; }
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .topbar { background: #fff; border-bottom: 1px solid #eee; padding: 0.85rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .topbar-title { font-size: 15px; font-weight: 600; color: #111; }
    .btn { font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #111; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; text-decoration: none; }
    .btn:hover { background: #f5f5f5; }
    .btn-primary { background: #378ADD; border-color: #378ADD; color: #fff; }
    .btn-primary:hover { background: #185FA5; }
    .btn-danger { background: #FCEBEB; border-color: #F09595; color: #A32D2D; }
    .content { padding: 1.5rem; flex: 1; }
    .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
    .badge-green { background: #EAF3DE; color: #3B6D11; }
    .badge-amber { background: #FAEEDA; color: #854F0B; }
    .badge-red { background: #FCEBEB; color: #A32D2D; }
    .badge-blue { background: #E6F1FB; color: #185FA5; }
    .view { display: none; }
    .view.active { display: block; }

    /* FORM */
    .form-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
    .form-card h3 { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
    .form-group label { font-size: 11px; font-weight: 500; color: #666; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.03em; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; font-size: 13px; padding: 9px 11px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #111; outline: none; font-family: inherit; }
    .form-group input:focus, .form-group select:focus { border-color: #378ADD; box-shadow: 0 0 0 3px rgba(55,138,221,0.1); }
    .form-actions { display: flex; gap: 8px; }
    .error-msg { background: #FCEBEB; border: 1px solid #F09595; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #A32D2D; margin-bottom: 1rem; display: none; }
    .success-msg { background: #EAF3DE; border: 1px solid #7CB95A; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #3B6D11; margin-bottom: 1rem; display: none; }

    /* VENDOR LIST */
    .filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; }
    .filter-row input { font-size: 13px; padding: 7px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #111; width: 240px; }
    .filter-tab { font-size: 12px; padding: 5px 12px; border-radius: 99px; border: 1px solid #ddd; background: transparent; color: #666; cursor: pointer; }
    .filter-tab.active { background: #378ADD; border-color: #378ADD; color: #fff; }
    .vendor-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .vendor-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 1.1rem; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; position: relative; }
    .vendor-card:hover { border-color: #ccc; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .vendor-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 0.85rem; }
    .vendor-avatar { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .vendor-name { font-size: 14px; font-weight: 600; color: #111; }
    .vendor-type { font-size: 11px; color: #999; margin-top: 2px; }
    .score-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .score-label { font-size: 11px; color: #999; }
    .score-pill { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
    .score-high { background: #EAF3DE; color: #3B6D11; }
    .score-mid { background: #FAEEDA; color: #854F0B; }
    .score-low { background: #FCEBEB; color: #A32D2D; }
    .score-bar { height: 4px; background: #f0f0f0; border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
    .score-fill { height: 100%; border-radius: 99px; }
    .vendor-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { font-size: 10px; padding: 2px 7px; border-radius: 99px; background: #f5f5f5; color: #666; }
    .delete-btn { position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; border-radius: 6px; border: 1px solid #ddd; background: #fff; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 12px; color: #A32D2D; }
    .vendor-card:hover .delete-btn { display: flex; }
    .add-card { border: 1px dashed #ddd; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; min-height: 180px; color: #999; font-size: 13px; gap: 8px; }
    .add-card:hover { background: #fafafa; color: #111; border-color: #378ADD; }
    .empty-state { text-align: center; padding: 3rem; background: #fff; border-radius: 12px; border: 1px solid #eee; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: #111; margin-bottom: 8px; }
    .empty-state p { font-size: 13px; color: #999; margin-bottom: 1.5rem; }
    .loading { text-align: center; padding: 2rem; color: #999; font-size: 13px; }

    /* DETAIL VIEW */
    .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #666; cursor: pointer; background: none; border: none; padding: 0; margin-bottom: 1rem; }
    .back-btn:hover { color: #111; }
    .profile-header { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
    .profile-left { display: flex; align-items: center; gap: 14px; }
    .profile-avatar { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; }
    .profile-name { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 4px; }
    .profile-meta { font-size: 12px; color: #999; display: flex; flex-wrap: wrap; gap: 12px; }
    .profile-meta span { display: flex; align-items: center; gap: 4px; }
    .score-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .score-card { background: #f5f5f5; border-radius: 10px; padding: 0.85rem; }
    .score-card-label { font-size: 11px; color: #999; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
    .score-card-value { font-size: 22px; font-weight: 700; color: #111; }
    .score-card-sub { font-size: 11px; color: #999; margin-top: 2px; }
    .overall-score { display: flex; align-items: center; gap: 14px; padding: 1rem; background: #f5f5f5; border-radius: 10px; margin-bottom: 1rem; }
    .overall-num { font-size: 42px; font-weight: 700; line-height: 1; }
    .score-breakdown { display: flex; flex-direction: column; gap: 5px; flex: 1; }
    .score-row-detail { display: flex; align-items: center; gap: 8px; font-size: 11px; }
    .score-row-detail span:first-child { width: 110px; color: #666; }
    .mini-bar { flex: 1; height: 4px; background: #e0e0e0; border-radius: 99px; overflow: hidden; }
    .mini-fill { height: 100%; border-radius: 99px; }
    .score-row-detail span:last-child { width: 30px; text-align: right; font-weight: 600; color: #111; }
    .card { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.85rem; }
    .card-title { font-size: 13px; font-weight: 600; color: #111; }
    .note-item { padding: 8px 10px; background: #f9f9f9; border-radius: 8px; margin-bottom: 6px; }
    .note-meta { font-size: 10px; color: #999; margin-bottom: 3px; }
    .note-text { font-size: 12px; color: #333; line-height: 1.5; }
    .note-input-row { display: flex; gap: 6px; margin-top: 8px; }
    .note-input-row input { flex: 1; font-size: 12px; padding: 7px 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #111; }
  </style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <a class="sidebar-logo" href="index.html"><i class="ti ti-settings-2"></i> FlowERP</a>
    <div class="section-label">Modules</div>
    <a class="nav-item" href="dashboard.html"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
    <a class="nav-item" href="runout.html"><i class="ti ti-box"></i> Inventory</a>
    <a class="nav-item" href="orders.html"><i class="ti ti-truck"></i> Procurement</a>
    <a class="nav-item" href="bom.html"><i class="ti ti-list-details"></i> Bill of Materials</a>
    <a class="nav-item" href="production.html"><i class="ti ti-settings-2"></i> Production</a>
    <a class="nav-item" href="finance.html"><i class="ti ti-receipt"></i> Finance</a>
    <a class="nav-item" href="atrisk.html"><i class="ti ti-alert-triangle"></i> At-risk parts</a>
    <a class="nav-item active" href="vendors.html"><i class="ti ti-users"></i> Vendors</a>
    <div class="section-label">Account</div>
    <a class="nav-item" href="index.html"><i class="ti ti-settings"></i> Settings</a>
    <div class="sidebar-footer" onclick="signOut()">
      <div class="avatar">ME</div>
      <div>
        <div class="user-name" id="user-name">Loading...</div>
        <div class="user-company" id="user-company">Loading...</div>
      </div>
      <i class="ti ti-logout" style="margin-left:auto;color:#999;font-size:14px;"></i>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="page-title">Vendor profiles</span>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="showView('add')"><i class="ti ti-plus"></i> Add vendor</button>
      </div>
    </div>

    <div class="content">

      <!-- ADD VENDOR VIEW -->
      <div class="view" id="view-add">
        <button class="back-btn" onclick="showView('list')"><i class="ti ti-arrow-left"></i> Back to vendors</button>
        <div class="form-card">
          <h3><i class="ti ti-users" style="color:#378ADD;"></i> Add new vendor</h3>

          <div class="error-msg" id="add-error"></div>
          <div class="success-msg" id="add-success"></div>

          <div class="form-grid">
            <div class="form-group">
              <label>Vendor name *</label>
              <input type="text" id="v-name" placeholder="e.g. Acme Metals" />
            </div>
            <div class="form-group">
              <label>Type / Category</label>
              <input type="text" id="v-type" placeholder="e.g. Raw materials, Components" />
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label>Email address</label>
              <input type="email" id="v-email" placeholder="orders@vendor.com" />
            </div>
            <div class="form-group">
              <label>Phone number</label>
              <input type="text" id="v-phone" placeholder="(555) 555-0100" />
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label>Location</label>
              <input type="text" id="v-location" placeholder="e.g. Pittsburgh, PA" />
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="v-status">
                <option value="monitor">Monitor — keep an eye on</option>
                <option value="trusted">Trusted — reliable vendor</option>
                <option value="hound">Hound list — needs attention</option>
              </select>
            </div>
          </div>

          <div class="form-grid-3">
            <div class="form-group">
              <label>Overall score (0-100)</label>
              <input type="number" id="v-score" placeholder="e.g. 85" min="0" max="100" value="75" />
            </div>
            <div class="form-group">
              <label>On-time delivery %</label>
              <input type="number" id="v-ontime" placeholder="e.g. 90" min="0" max="100" value="80" />
            </div>
            <div class="form-group">
              <label>Lead time (days)</label>
              <input type="number" id="v-leadtime" placeholder="e.g. 7" min="1" value="7" />
            </div>
          </div>

          <div class="form-actions">
            <button class="btn btn-primary" onclick="addVendor()"><i class="ti ti-check"></i> Save vendor</button>
            <button class="btn" onclick="showView('list')">Cancel</button>
          </div>
        </div>
      </div>

      <!-- LIST VIEW -->
      <div class="view active" id="view-list">
        <div class="filter-row">
          <input type="text" id="search-input" placeholder="Search vendors..." oninput="filterVendors()" />
          <button class="filter-tab active" onclick="filterByStatus(this, 'all')">All</button>
          <button class="filter-tab" onclick="filterByStatus(this, 'trusted')">✅ Trusted</button>
          <button class="filter-tab" onclick="filterByStatus(this, 'hound')">⚠️ Hound</button>
          <button class="filter-tab" onclick="filterByStatus(this, 'monitor')">👁 Monitor</button>
        </div>
        <div class="vendor-grid" id="vendor-grid">
          <div class="loading">Loading vendors...</div>
        </div>
      </div>

      <!-- DETAIL VIEW -->
      <div class="view" id="view-detail">
        <button class="back-btn" onclick="showView('list')"><i class="ti ti-arrow-left"></i> Back to all vendors</button>
        <div id="detail-content"></div>
      </div>

    </div>
  </div>
</div>

<script>
  let allVendors = [];
  let currentFilter = 'all';
  let companyId = null;

  function getInitials(name) {
    return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function getScoreColor(score) {
    return score >= 85 ? '#1D9E75' : score >= 65 ? '#BA7517' : '#E24B4A';
  }

  function getBarColor(score) {
    return score >= 85 ? '#639922' : score >= 65 ? '#BA7517' : '#E24B4A';
  }

  function getAvatarColors(status) {
    if (status === 'trusted') return { bg: '#E6F1FB', color: '#185FA5' };
    if (status === 'hound') return { bg: '#FCEBEB', color: '#A32D2D' };
    return { bg: '#FAEEDA', color: '#854F0B' };
  }

  function getStatusBadge(status) {
    if (status === 'trusted') return '<span class="badge badge-green">✓ Trusted</span>';
    if (status === 'hound') return '<span class="badge badge-red">⚠ Hound list</span>';
    return '<span class="badge badge-amber">Monitor</span>';
  }

  function showView(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
    const titles = { list: 'Vendor profiles', add: 'Add new vendor', detail: document.getElementById('page-title').textContent };
    document.getElementById('page-title').textContent = titles[view] || 'Vendors';
    if (view === 'list') loadVendors();
  }

  async function loadVendors() {
    if (!companyId) return;
    const { data, error } = await db.from('vendors').select('*').eq('company_id', companyId).order('score', { ascending: false });
    if (error) { console.error(error); return; }
    allVendors = data;
    renderVendors(data);
  }

  function renderVendors(vendors) {
    const grid = document.getElementById('vendor-grid');

    if (vendors.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div style="font-size:40px;margin-bottom:1rem;">🏭</div>
          <h3>No vendors yet</h3>
          <p>Add your first vendor to get started tracking delivery performance and scores.</p>
          <button class="btn btn-primary" onclick="showView('add')"><i class="ti ti-plus"></i> Add your first vendor</button>
        </div>`;
      return;
    }

    grid.innerHTML = vendors.map(v => {
      const colors = getAvatarColors(v.status);
      return `
        <div class="vendor-card" onclick="showDetail('${v.id}')">
          <button class="delete-btn" onclick="event.stopPropagation();deleteVendor('${v.id}', '${v.name.replace(/'/g, "\\'")}')">✕</button>
          <div class="vendor-card-top">
            <div class="vendor-avatar" style="background:${colors.bg};color:${colors.color};">${getInitials(v.name)}</div>
            <div><div class="vendor-name">${v.name}</div><div class="vendor-type">${v.type || 'Supplier'}</div></div>
          </div>
          <div class="score-row"><span class="score-label">Overall score</span><span class="score-pill ${v.score >= 85 ? 'score-high' : v.score >= 65 ? 'score-mid' : 'score-low'}">${v.score} / 100</span></div>
          <div class="score-bar"><div class="score-fill" style="width:${v.score}%;background:${getBarColor(v.score)};"></div></div>
          <div class="vendor-tags">
            ${getStatusBadge(v.status)}
            <span class="tag">On-time ${v.on_time_percent}%</span>
            ${v.location ? `<span class="tag">${v.location}</span>` : ''}
          </div>
        </div>`;
    }).join('') + `<div class="add-card" onclick="showView('add')"><i class="ti ti-plus" style="font-size:22px;"></i> Add vendor</div>`;
  }

  function filterVendors() {
    const search = document.getElementById('search-input').value.toLowerCase();
    let filtered = allVendors;
    if (currentFilter !== 'all') filtered = filtered.filter(v => v.status === currentFilter);
    if (search) filtered = filtered.filter(v => v.name.toLowerCase().includes(search) || (v.type || '').toLowerCase().includes(search));
    renderVendors(filtered);
  }

  function filterByStatus(el, status) {
    currentFilter = status;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    filterVendors();
  }

  async function addVendor() {
    const name = document.getElementById('v-name').value.trim();
    const type = document.getElementById('v-type').value.trim();
    const email = document.getElementById('v-email').value.trim();
    const phone = document.getElementById('v-phone').value.trim();
    const location = document.getElementById('v-location').value.trim();
    const status = document.getElementById('v-status').value;
    const score = parseInt(document.getElementById('v-score').value) || 75;
    const ontime = parseInt(document.getElementById('v-ontime').value) || 80;

    document.getElementById('add-error').style.display = 'none';
    document.getElementById('add-success').style.display = 'none';

    if (!name) {
      document.getElementById('add-error').textContent = 'Vendor name is required.';
      document.getElementById('add-error').style.display = 'block';
      return;
    }

    const { error } = await db.from('vendors').insert({
      name, type, email, phone, location, status, score,
      on_time_percent: ontime,
      company_id: companyId
    });

    if (error) {
      document.getElementById('add-error').textContent = 'Error saving vendor: ' + error.message;
      document.getElementById('add-error').style.display = 'block';
      return;
    }

    document.getElementById('add-success').textContent = '✅ ' + name + ' added successfully!';
    document.getElementById('add-success').style.display = 'block';

    // Clear form
    ['v-name','v-type','v-email','v-phone','v-location'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('v-score').value = '75';
    document.getElementById('v-ontime').value = '80';
    document.getElementById('v-status').value = 'monitor';

    setTimeout(() => showView('list'), 1200);
  }

  async function deleteVendor(id, name) {
    if (!confirm('Delete ' + name + '? This cannot be undone.')) return;
    const { error } = await db.from('vendors').delete().eq('id', id).eq('company_id', companyId);
    if (error) { alert('Error: ' + error.message); return; }
    loadVendors();
  }

  async function showDetail(id) {
    const vendor = allVendors.find(v => v.id === id);
    if (!vendor) return;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-detail').classList.add('active');
    document.getElementById('page-title').textContent = vendor.name;

    const colors = getAvatarColors(vendor.status);
    const scoreColor = getScoreColor(vendor.score);
    const barColor = getBarColor(vendor.score);

    document.getElementById('detail-content').innerHTML = `
      <div class="profile-header">
        <div class="profile-left">
          <div class="profile-avatar" style="background:${colors.bg};color:${colors.color};">${getInitials(vendor.name)}</div>
          <div>
            <div class="profile-name">${vendor.name}</div>
            <div class="profile-meta">
              ${vendor.location ? `<span><i class="ti ti-map-pin"></i> ${vendor.location}</span>` : ''}
              ${vendor.phone ? `<span><i class="ti ti-phone"></i> ${vendor.phone}</span>` : ''}
              ${vendor.email ? `<span><i class="ti ti-mail"></i> ${vendor.email}</span>` : ''}
            </div>
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <a href="orders.html" class="btn"><i class="ti ti-file-report"></i> Open order report</a>
          <button class="btn btn-primary"><i class="ti ti-plus"></i> New PO</button>
        </div>
      </div>

      <div class="overall-score" style="${vendor.status === 'hound' ? 'background:#FFF5F5;' : ''}">
        <div class="overall-num" style="color:${scoreColor};">${vendor.score}</div>
        <div style="flex:1;">
          <div style="font-size:12px;color:#666;margin-bottom:8px;">Overall score — ${getStatusBadge(vendor.status)}</div>
          <div class="score-breakdown">
            <div class="score-row-detail"><span>On-time delivery</span><div class="mini-bar"><div class="mini-fill" style="width:${vendor.on_time_percent}%;background:${barColor};"></div></div><span>${vendor.on_time_percent}%</span></div>
            <div class="score-row-detail"><span>Overall score</span><div class="mini-bar"><div class="mini-fill" style="width:${vendor.score}%;background:${barColor};"></div></div><span>${vendor.score}</span></div>
          </div>
        </div>
      </div>

      <div class="score-cards">
        <div class="score-card"><div class="score-card-label">Score</div><div class="score-card-value" style="color:${scoreColor};">${vendor.score}</div><div class="score-card-sub">Out of 100</div></div>
        <div class="score-card"><div class="score-card-label">On-time</div><div class="score-card-value">${vendor.on_time_percent}%</div><div class="score-card-sub">Delivery rate</div></div>
        <div class="score-card"><div class="score-card-label">Status</div><div class="score-card-value" style="font-size:13px;margin-top:4px;">${vendor.status === 'trusted' ? '✓ Trusted' : vendor.status === 'hound' ? '⚠ Hound' : '👁 Monitor'}</div></div>
        <div class="score-card"><div class="score-card-label">Type</div><div class="score-card-value" style="font-size:13px;margin-top:4px;">${vendor.type || '—'}</div></div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Notes</span><button class="btn btn-primary" style="font-size:11px;padding:4px 10px;" onclick="document.getElementById('note-input-${vendor.id}').focus()"><i class="ti ti-plus"></i> Add note</button></div>
        <div id="notes-${vendor.id}">
          <div class="note-item"><div class="note-meta">System note</div><div class="note-text">Vendor added to FlowERP. Add notes to track performance, contacts, and issues.</div></div>
        </div>
        <div class="note-input-row">
          <input type="text" id="note-input-${vendor.id}" placeholder="Add a note about this vendor..." />
          <button class="btn btn-primary" onclick="saveNote('${vendor.id}')">Save</button>
        </div>
      </div>

      <div style="margin-top:1rem;">
        <button class="btn btn-danger" onclick="deleteVendor('${vendor.id}', '${vendor.name.replace(/'/g, "\\'")}');showView('list')"><i class="ti ti-trash"></i> Delete vendor</button>
      </div>
    `;
  }

  function saveNote(vendorId) {
    const input = document.getElementById('note-input-' + vendorId);
    const text = input.value.trim();
    if (!text) return;
    const list = document.getElementById('notes-' + vendorId);
    const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const div = document.createElement('div');
    div.className = 'note-item';
    div.innerHTML = `<div class="note-meta">${today} · You</div><div class="note-text">${text}</div>`;
    list.insertBefore(div, list.firstChild);
    input.value = '';
  }

  // Init
  initAuth().then(result => {
    if (!result) return;
    companyId = result.companyId;
    loadVendors();
  });
</script>
</body>
</html>
